<!doctype html><html lang="ru"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Миг владелец</title><style>body{font-family:system-ui;margin:0;background:#fbfaff;color:#15142d}.wrap{max-width:1040px;margin:auto;padding:28px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}.card{background:white;border:1px solid #eee8fa;border-radius:24px;padding:20px;margin:14px 0;box-shadow:0 18px 50px #27195a12}.stat{font-size:28px;font-weight:900;color:#f22d8f}input,button{height:42px;border-radius:14px;border:1px solid #e8e5f2;padding:0 12px}button{background:#f22d8f;color:white;font-weight:800;border:0;margin-left:8px}pre{white-space:pre-wrap;background:#f6f2ff;border-radius:18px;padding:16px;overflow:auto}.muted{color:#7d7890}</style><div class="wrap"><h1>Миг — владелец</h1><div class="card"><input id="token" placeholder="OWNER_TOKEN"><button onclick="load()">Загрузить</button><button onclick="resetDb()">Сбросить базу</button></div><div id="stats" class="grid"></div><div class="card"><h2>Содержимое базы</h2><p class="muted">Пользователи, посты, видео, места, сообщения и игры.</p><pre id="out">Введите токен и загрузите данные.</pre></div></div><script>async function req(p,o={}){let t=token.value;let r=await fetch('/api/owner/'+p,{...o,headers:{'Content-Type':'application/json','x-owner-token':t}});let d=await r.json();if(!r.ok)throw Error(d.error);return d}function box(n,v){return '<div class="card"><div class="stat">'+v+'</div><b>'+n+'</b></div>'}async function load(){try{let d=await req('data');stats.innerHTML=box('Пользователи',d.users.length)+box('Посты',d.posts.length)+box('Истории',d.stories.length)+box('Видео',d.videos.length)+box('Места',d.places.length)+box('Диалоги',d.dialogs.length)+box('Сообщения',d.messages.length)+box('Игры',d.games.length);out.textContent=JSON.stringify(d,null,2)}catch(e){alert(e.message)}}async function resetDb(){if(confirm('Сбросить базу?')){await req('reset',{method:'POST'});load()}}</script></html>
