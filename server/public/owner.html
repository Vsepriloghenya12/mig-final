<!doctype html><html lang="ru"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Миг владелец</title><style>body{font-family:system-ui;margin:0;background:#fbfaff;color:#15142d}.wrap{max-width:980px;margin:auto;padding:28px}.card{background:white;border:1px solid #eee8fa;border-radius:24px;padding:22px;margin:14px 0}input,button{height:42px;border-radius:14px;border:1px solid #e8e5f2;padding:0 12px}button{background:#f22d8f;color:white;font-weight:800;border:0}pre{white-space:pre-wrap;background:#f6f2ff;border-radius:18px;padding:16px;overflow:auto}</style><div class="wrap"><h1>Миг — владелец</h1><div class="card"><input id="token" placeholder="OWNER_TOKEN"><button onclick="load()">Загрузить</button><button onclick="resetDb()">Сбросить базу</button></div><div id="stats" class="card">Введите токен</div><pre id="out"></pre></div><script>async function req(p,o={}){let t=token.value;let r=await fetch('/api/owner/'+p,{...o,headers:{'Content-Type':'application/json','x-owner-token':t}});let d=await r.json();if(!r.ok)throw Error(d.error);return d}async function load(){try{let d=await req('data');stats.innerHTML='<b>Пользователи:</b> '+d.users.length+' · <b>Посты:</b> '+d.posts.length+' · <b>Видео:</b> '+d.videos.length+' · <b>Сообщения:</b> '+d.messages.length;out.textContent=JSON.stringify(d,null,2)}catch(e){alert(e.message)}}async function resetDb(){if(confirm('Сбросить базу?')){await req('reset',{method:'POST'});load()}}</script></html>
